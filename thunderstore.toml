[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "LoadoutImprovements"
description = "Expands gear loadouts to 9 slots with paging, renaming, previews, custom icons, and equipped-slot highlighting."

websiteUrl = "https://github.com/Little-Sparroh/LoadoutImprovements"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"
Sparroh-SparrohUILib = "1.1.1"


[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/LoadoutImprovements.dll"
target = "BepInEx/plugins/LoadoutImprovements.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
